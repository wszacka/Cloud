apiVersion: apps/v1
kind: Deployment
metadata:
  name: springbooksro-dep
spec:
  replicas: 3
  selector:
    matchLabels:
      tier: frontendro
  template:
    metadata:
      labels:
        tier: frontendro
    spec:
      containers:
        - name: springbooks
          image: markvellaum/springbooksro:v0.0.1
          env:
            - name: PGHOST
              value: "mypgsql-postgresql"
            - name: PGPORT
              value: "5432"
            - name: PGDB
              value: "books"
            - name: PGUSER
              value: "postgres"
            - name: PGPASS
              valueFrom:
                secretKeyRef:
                  name: mypgsql-postgresql
                  key: postgres-password
